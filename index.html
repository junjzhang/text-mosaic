<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>text-mosaic</title>
  </head>
  <body>
    <div id="app">
      <aside class="controls" id="controls">
        <h1>
          text-mosaic
          <button type="button" class="toggle" id="toggle" aria-expanded="true">收起</button>
        </h1>

        <input type="file" id="file" accept="image/*" hidden />
        <input type="color" id="customColor" value="#B7AFC7" hidden />

        <label class="output">
          <span>输出</span>
          <div class="segmented" id="output" role="radiogroup" aria-label="输出模式">
            <button type="button" data-value="positive" aria-checked="true">正形</button>
            <button type="button" data-value="negative" aria-checked="false">负形</button>
            <button type="button" data-value="hstack" aria-checked="false">横排</button>
            <button type="button" data-value="vstack" aria-checked="false">纵排</button>
          </div>
        </label>

        <label class="words">
          <span>文字</span>
          <input type="text" id="words" value="flower" placeholder="逗号分隔多个词" />
        </label>

        <label>
          <span>字号 <output id="sizeOut">24</output>px</span>
          <input type="range" id="size" min="8" max="80" step="1" value="24" />
        </label>

        <label>
          <span>密度 <output id="densityOut">0.5</output></span>
          <input type="range" id="density" min="0.15" max="2" step="0.05" value="0.5" />
        </label>

        <label>
          <span>抖动 <output id="jitterOut">0.3</output></span>
          <input type="range" id="jitter" min="0" max="1" step="0.05" value="0.3" />
        </label>

        <label>
          <span>字号随机 <output id="sizeVarOut">0.3</output></span>
          <input type="range" id="sizeVar" min="0" max="1" step="0.05" value="0.3" />
        </label>

        <label class="font">
          <span>字体</span>
          <select id="font">
            <option value="Helvetica, Arial, sans-serif">Helvetica</option>
            <option value="system-ui, -apple-system, sans-serif">System</option>
            <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
            <option value="'Arial Black', sans-serif">Arial Black</option>
            <option value="Impact, sans-serif">Impact</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="'Times New Roman', serif">Times</option>
            <option value="'Courier New', monospace">Courier</option>
          </select>
        </label>

        <label class="bg">
          <span id="colorLabel">背景色</span>
          <div class="color-grid" id="colorGrid"></div>
        </label>

        <div class="actions">
          <button id="download" type="button">下载 PNG</button>
        </div>

        <label class="swap-link" for="file" id="swapLink">换一张图片</label>

        <p class="hint">拖拽图片到画布也可以</p>
      </aside>

      <main class="stage">
        <canvas id="canvas"></canvas>
        <label id="placeholder" for="file">选择一张图片开始</label>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
